<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <!-- Premium dark slate to deep blue background gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030712" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <!-- Glowing cyan-indigo-purple brand gradient -->
    <linearGradient id="brand-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />   <!-- Sky 400 -->
      <stop offset="50%" stop-color="#6366f1" />  <!-- Indigo 500 -->
      <stop offset="100%" stop-color="#a855f7" /> <!-- Purple 500 -->
    </linearGradient>
    <!-- Soft glow filter for the logo mark -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background squircle with a subtle border -->
  <rect width="32" height="32" rx="9" fill="url(#bg-grad)" />
  <rect width="31" height="31" x="0.5" y="0.5" rx="8.5" stroke="#1e293b" stroke-width="1" />

  <!-- Clean, custom geometric SD monogram -->
  <g filter="url(#glow)">
    <!-- Letter S (Custom smooth path) -->
    <path d="M 14.5 11 C 11.5 11, 9.5 12.5, 9.5 14.5 C 9.5 16.5, 11.5 17, 13.5 17.5 C 15.5 18, 16 19, 16 20 C 16 21.5, 14 22.5, 11.5 22.5" 
          stroke="url(#brand-grad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    
    <!-- Letter D (Custom smooth path) -->
    <path d="M 19 11 V 22.5 M 19 11.25 C 21.5 11.25, 23.5 13, 23.5 16.75 C 23.5 20.5, 21.5 22.25, 19 22.25" 
          stroke="url(#brand-grad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" />
  </g>
</svg>